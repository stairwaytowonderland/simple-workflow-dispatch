# Dispatch a workflow via workflow_dispatch.
#
# Wraps `gh workflow run` so callers only need to supply the workflow file,
# the target ref, and optional flags. The ref is also passed as the tag field.
#
# GITHUB_TOKEN can trigger workflow_dispatch — this is an explicit exception
# to GitHub's rule that GITHUB_TOKEN cannot trigger workflows.
# https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication#using-the-github_token-in-a-workflow

name: Dispatch a workflow
description: Trigger a workflow_dispatch event on a target workflow file.
author: stairwaytowonderland
inputs:
  workflow:
    description: Workflow file to dispatch (e.g. publish.yaml)
    required: true
  tag:
    description: Tag associated with the workflow dispatch event.
    required: false
    default: ''
  fields:
    description: |
      Newline-separated list of additional key=value pairs passed as --field arguments.
      Example:
        extra-key=extra-value
    required: false
    default: ''
  ref:
    description: |
      Git ref to run the workflow on (e.g. sha, main, or a tag name);
      defaults to the tag input if not set.
    required: false
    default: ${{ github.ref }}

runs:
  using: composite
  steps:
    - name: Dispatch ${{ inputs.workflow }}
      shell: bash
      run: |
        field=()
        if [ -n "$TAG" ]; then
          field+=(--field tag="$TAG")
        fi

        # Append any extra fields from the fields input
        while IFS= read -r line; do
          line="${line## }"
          line="${line%% }"
          [ -n "$line" ] || continue
          field+=(--field "$line")
        done <<< "$FIELDS"

        gh workflow run "${{ inputs.workflow }}" \
          --repo "${{ github.repository }}" \
          --ref "$REF" \
          "${field[@]}"
      env:
        GH_TOKEN: ${{ github.token }}
        REF: ${{ inputs.tag != '' && inputs.tag || inputs.ref }}
        TAG: ${{ inputs.tag }}
        FIELDS: ${{ inputs.fields }}

branding:
  icon: target
  color: gray-dark
